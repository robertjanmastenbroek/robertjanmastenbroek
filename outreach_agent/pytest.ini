[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
filterwarnings =
    ignore::DeprecationWarning:fleet_state
    ignore::DeprecationWarning:events
markers =
    slow: marks tests that hit the filesystem heavily or take >1s
