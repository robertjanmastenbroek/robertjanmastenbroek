<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1080px; height:1920px; overflow:hidden; background:#06040F; }
.slide {
  width:1080px; height:1920px; position:relative;
  background:linear-gradient(170deg, #06040F 0%, #130A05 50%, #1A0D04 70%, #0A0608 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:0 80px;
}
/* sunburst */
.sunburst {
  position:absolute; top:280px; left:50%; transform:translateX(-50%);
  width:400px; height:400px;
  background:radial-gradient(circle, rgba(255,180,30,0.18) 0%, rgba(200,100,20,0.06) 40%, transparent 70%);
  border-radius:50%;
}
/* sun circle */
.sun {
  position:absolute; top:340px; left:50%; transform:translateX(-50%);
  width:140px; height:140px; border-radius:50%;
  background:radial-gradient(circle, #FFD060 0%, #FF9010 60%, #C05000 100%);
  box-shadow:0 0 60px rgba(255,160,30,0.4), 0 0 120px rgba(255,120,20,0.2);
}
.top-bar { position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg, transparent, #D4AF37 30%, #F5D97A 60%, #D4AF37 80%, transparent); }
.bottom-bar { position:absolute; bottom:0; left:0; right:0; height:5px; background:linear-gradient(90deg, transparent, #D4AF37 30%, #F5D97A 60%, #D4AF37 80%, transparent); }
.content { position:relative; z-index:2; margin-top:200px; }
.free { font-family:'Playfair Display'; font-weight:900; font-size:160px; color:#FFFFFF; letter-spacing:-6px; line-height:1; }
.friday { font-family:'Inter'; font-weight:600; font-size:36px; letter-spacing:12px; color:#D4AF37; text-transform:uppercase; margin:16px 0 8px; }
.sessions { font-family:'Playfair Display'; font-weight:400; font-size:56px; color:#C8BEB0; font-style:italic; }
.rule { width:1px; height:100px; background:linear-gradient(180deg,transparent,#D4AF37,transparent); margin:60px auto; }
.location { font-family:'Inter'; font-weight:300; font-size:24px; color:#8A7F70; letter-spacing:2px; margin-bottom:16px; }
.location strong { color:#C8BEB0; font-weight:400; }
.taglines { margin-top:60px; }
.tag { font-family:'Playfair Display'; font-weight:700; font-size:42px; line-height:1.3; }
.handle { margin-top:100px; font-family:'Inter'; font-weight:300; font-size:20px; letter-spacing:3px; color:#3A2F20; }
</style>
</head><body>
<div class="slide">
  <div class="sunburst"></div>
  <div class="sun"></div>
  <div class="top-bar"></div>
  <div class="content">
    <div class="free">FREE</div>
    <div class="friday">Friday</div>
    <div class="sessions">Sunset Sessions</div>
    <div class="rule"></div>
    <div class="location">Every Friday &nbsp;·&nbsp; <strong>Tenerife, Canary Islands</strong></div>
    <div class="taglines">
      <div class="tag" style="color:#D4AF37;">Tribal techno.</div>
      <div class="tag" style="color:#FFFFFF;">Sacred frequencies.</div>
      <div class="tag" style="color:#8A7F70;">Under an open sky.</div>
    </div>
    <div class="handle">@robertjanmastenbroek</div>
  </div>
  <div class="bottom-bar"></div>
</div>
</body></html>
