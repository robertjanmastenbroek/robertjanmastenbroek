<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert-Jan Mastenbroek</title>
  <meta name="description" content="Ancient Truth. Future Sound. — Stream, watch, and support the mission.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #0a0a0a;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(28px, 6vw, 40px);
      letter-spacing: 0.06em;
      text-align: center;
      color: #ffffff;
      line-height: 1.1;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #a08828;
      margin-top: 10px;
      text-align: center;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #d4af37;
      margin: 28px auto;
      flex-shrink: 0;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      width: 100%;
      min-height: 56px;
      padding: 16px 24px;
      border: 1px solid #d4af37;
      border-radius: 4px;
      background: transparent;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      transition: background 200ms ease, letter-spacing 200ms ease, border-color 200ms ease;
      cursor: pointer;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-btn:hover,
    .link-btn:focus-visible {
      background: rgba(212, 175, 55, 0.08);
      letter-spacing: 0.20em;
      border-color: #e8c84a;
      outline: 2px solid #d4af37;
      outline-offset: 2px;
    }

    .link-btn:active {
      background: rgba(212, 175, 55, 0.14);
    }

    .link-btn--cta {
      background: #d4af37;
      color: #0a0a0a;
      border-color: #d4af37;
      margin-top: 8px;
      font-weight: 500;
    }

    .link-btn--cta:hover,
    .link-btn--cta:focus-visible {
      background: #e8c84a;
      border-color: #e8c84a;
      letter-spacing: 0.20em;
    }

    .link-btn--cta:active {
      background: #c9a632;
    }

    .footer {
      margin-top: 36px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="name">Robert-Jan Mastenbroek</h1>
    <p class="tagline">Ancient Truth. Future Sound.</p>

    <div class="divider"></div>

    <nav class="links" aria-label="Platform links">
      <a
        class="link-btn"
        href="https://open.spotify.com/artist/2Seaafm5k1hAuCkpdq7yds"
        target="_blank"
        rel="noopener noreferrer"
      >Spotify</a>

      <a
        class="link-btn"
        href="https://youtube.com/@robertjanmastenbroek"
        target="_blank"
        rel="noopener noreferrer"
      >YouTube</a>

      <a
        class="link-btn"
        href="https://music.apple.com/us/artist/robert-jan-mastenbroek/1875064180"
        target="_blank"
        rel="noopener noreferrer"
      >Apple Music</a>

      <a
        class="link-btn"
        href="https://music.amazon.ca/artists/B0B3T5597W/robert-jan-mastenbroek"
        target="_blank"
        rel="noopener noreferrer"
      >Amazon Music</a>

      <a
        class="link-btn link-btn--cta"
        href="/offering"
      >Support the Mission</a>
    </nav>

    <p class="footer">robertjanmastenbroek.com</p>
  </div>
</body>
</html>
